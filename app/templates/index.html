<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Recomendador de Livros</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/estilo.css') }}">
</head>
<body>
    <div class="container">
        <h1>📚 Recomendador de Livros</h1>
        <p>Digite um tema, gênero ou um livro que você gostou:</p>
        <div class="input-group">
            <input type="text" id="entrada" placeholder="Ex: ficção científica, ou '1984'" size="50">
            <button id="btn-recomendar">Recomendar</button>
        </div>

        <div id="resultado"></div>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
